
spring.datasource.url=jdbc:mysql://localhost:3306/alert_engine_db?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

server.port=8080

spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USER:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}




spring.security.oauth2.resourceserver.jwt.issuer-uri=${AUTH0_ISSUER_URI}


spring.security.oauth2.resourceserver.jwt.audience=${AUTH0_AUDIENCE}

cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000}

app.telegram.bot-token=${TELEGRAM_BOT_TOKEN}
app.telegram.chat-id=${TELEGRAM_CHAT_ID}